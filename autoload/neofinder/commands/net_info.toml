# ══════════════════════════════════════════════════════════
# NetInfo -- network interfaces, routes, DNS, ports
# ══════════════════════════════════════════════════════════

name = "NetInfo"
desc = "Network interfaces, IPs, routes, DNS"
deps = ["output", "shell"]
out = "[Network Info]"
platform = "linux,darwin"

[header]
show = true
separator = "="
width = 50

[env]
timestamp = "datetime.now().strftime('%Y-%m-%d %H:%M')"
