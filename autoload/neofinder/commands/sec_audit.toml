# ══════════════════════════════════════════════════════════
# SecAudit -- quick security audit pipeline
#
# Runs multiple checks in sequence, each step's output
# is independent (on_fail = "continue" keeps going).
# ══════════════════════════════════════════════════════════

name = "SecAudit"
desc = "Quick security audit (ports, users, suid, conns)"
deps = ["output", "shell"]
out = "[Security Audit]"
platform = "linux,darwin"
timeout = 60

[env]
hostname = "platform.node()"
timestamp = "datetime.now().strftime('%Y-%m-%d %H:%M:%S')"

[header]
show = true
separator = "═"
width = 70

[pipeline]
chain = "ports >> users >> suid >> conns >> world"
on_fail = "continue"

[pipeline.steps]
ports = { type = "shell", cmd = "echo '── LISTENING PORTS ──' && lsof -iTCP -sTCP:LISTEN -nP 2>/dev/null | tail -n +2 | awk '{printf \"  %-12s %-6s %s\\n\", $1, $2, $9}' || echo '  (requires sudo)'" }
users = { type = "shell", cmd = "echo '' && echo '── LOGGED IN USERS ──' && w -h 2>/dev/null | awk '{printf \"  %-12s %-8s %s\\n\", $1, $3, $5}' || echo '  (not available)'" }
suid  = { type = "shell", cmd = "echo '' && echo '── SUID BINARIES ──' && find /usr/local/bin /usr/bin -perm -4000 2>/dev/null | head -20 | sed 's/^/  /' || echo '  (none found)'" }
conns = { type = "shell", cmd = "echo '' && echo '── ESTABLISHED CONNECTIONS ──' && lsof -iTCP -sTCP:ESTABLISHED -nP 2>/dev/null | tail -n +2 | awk '{printf \"  %-12s %-6s %s\\n\", $1, $2, $9}' | head -20 || echo '  (none)'" }
world = { type = "shell", cmd = "echo '' && echo '── WORLD-WRITABLE FILES (/tmp) ──' && find /tmp -maxdepth 2 -perm -002 -type f 2>/dev/null | head -15 | sed 's/^/  /' || echo '  (none found)'", on_fail = "skip" }
