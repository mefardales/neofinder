# ══════════════════════════════════════════════════════════
# DiskUsage -- show disk usage (shell-only, no .py needed)
# ══════════════════════════════════════════════════════════

name = "DiskUsage"
desc = "Disk usage summary"
deps = ["output", "shell"]
out = "[Disk Usage]"
platform = "linux,darwin"

[shell]
cmd = "df -h"

[header]
show = true
separator = "="
width = 50
